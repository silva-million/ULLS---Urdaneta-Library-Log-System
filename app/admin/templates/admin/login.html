<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ULLS – Admin Login</title>

  <!-- Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --c-accent: #CB997E;
      --c-accent-2: #DDBEA9;
      --c-bg: #FFE8D6;
      --c-muted: #B7B7A4;
      --c-muted-2: #A5A58D;
      --c-dark: #6B705C;

      --txt: #1a1a1a;
      --border: rgba(107, 112, 92, .22);
      --shadow: 0 18px 46px rgba(0, 0, 0, .10);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--txt);
      min-height: 100vh;
      background:
        radial-gradient(760px 340px at 75% 8%, rgba(203, 153, 126, .16), transparent 62%),
        radial-gradient(560px 280px at 20% 18%, rgba(165, 165, 141, .18), transparent 60%),
        linear-gradient(180deg, var(--c-bg), #fff);
      overflow-x: hidden;
    }

    /* FULL SCREEN center column */
    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 28px 16px;
      position: relative;
    }

    /* softer background blobs (so they don’t overpower) */
    .shell:before,
    .shell:after {
      content: "";
      position: absolute;
      width: 780px;
      height: 780px;
      border-radius: 999px;
      filter: blur(0.2px);
      opacity: .75;
      pointer-events: none;
      z-index: 0;
    }

    .shell:before {
      top: -180px;
      right: -160px;
      background: rgba(183, 183, 164, .22);
    }

    .shell:after {
      bottom: -220px;
      left: -180px;
      background: rgba(203, 153, 126, .16);
    }

    /* shared width for both cards */
    .stack {
      width: min(520px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    /* TOP CARD */
    .art-card {
      width: 100%;
      background: rgba(255, 255, 255, .60);
      border: 1px solid rgba(107, 112, 92, .18);
      border-radius: var(--radius);
      box-shadow: 0 14px 34px rgba(0, 0, 0, .08);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .book-illu {
      width: 120px;
      height: 84px;
      flex: 0 0 auto;
      filter: drop-shadow(0 10px 12px rgba(0, 0, 0, .08));
    }

    .art-meta {
      align-items: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(221, 190, 169, .55);
      border: 1px solid rgba(203, 153, 126, .24);
      font-size: 18px;
      font-weight: 600;
      color: rgba(0, 0, 0, .70);
      width: fit-content;
      margin-bottom: 8px;
    }

    .kdot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--c-dark);
      box-shadow: 0 0 0 4px rgba(107, 112, 92, .14);
    }

    .art-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--c-dark);
      line-height: 1.15;
    }

    .art-sub {
      margin: 5px 0 0;
      font-size: 12.5px;
      color: rgba(0, 0, 0, .60);
      line-height: 1.35;
    }

    /* LOGIN CARD */
    .login {
      width: 100%;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 20px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand .badge {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--c-accent);
      box-shadow: 0 0 0 5px rgba(203, 153, 126, .22);
    }

    .brand h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--c-dark);
      letter-spacing: .2px;
    }

    .title {
      margin: 10px 0 10px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.3px;
      text-align: center;
      color: #111;
      
    }

    .divider {
      height: 1px;
      background: rgba(107, 112, 92, .18);
      margin: 0 0 14px;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 0, 0, .66);
      margin-bottom: 6px;
      display: block;
    }

    .field {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(107, 112, 92, .22);
      border-radius: 14px;
      padding: 12px 12px;
      outline: none;
      width: 100%;
      font-size: 14px;
      transition: .15s ease;
    }

    .field:focus {
      border-color: rgba(203, 153, 126, .75);
      box-shadow: 0 0 0 4px rgba(203, 153, 126, .16);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 14px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: .15s ease;
      user-select: none;
      width: 100%;
    }

    .btn-primary {
      background: var(--c-dark);
      color: #fff;
      box-shadow: 0 12px 20px rgba(107, 112, 92, .22);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 26px rgba(107, 112, 92, .24);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .link {
      color: rgba(0, 0, 0, .70);
      font-size: 13px;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 12px;
    }

    .link:hover {
      background: rgba(221, 190, 169, .55);
    }

    .mini-foot {
      margin-top: 10px;
      font-size: 11.5px;
      color: rgba(0, 0, 0, .55);
      text-align: center;
    }

    .error {
      margin-top: 10px;
      background: rgba(203, 153, 126, .16);
      border: 1px solid rgba(203, 153, 126, .34);
      color: rgba(0, 0, 0, .78);
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
    }

    @media (max-width: 420px) {
      .art-card {
        flex-direction: column;
        text-align: center;
      }

      .kicker {
        margin: 0 auto 8px;
      }

      .art-meta {
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="stack">

      <!-- TOP INFO CARD -->
      <div class="art-card">
        <svg class="book-illu" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="165" cy="198" rx="120" ry="14" fill="rgba(0,0,0,.10)" />
          <rect x="58" y="92" width="70" height="95" rx="12" fill="#DDBEA9" />
          <rect x="66" y="106" width="54" height="10" rx="5" fill="rgba(255,255,255,.55)" />
          <rect x="66" y="126" width="40" height="10" rx="5" fill="rgba(255,255,255,.45)" />
          <rect x="126" y="72" width="78" height="115" rx="12" fill="#CB997E" />
          <rect x="136" y="88" width="56" height="10" rx="5" fill="rgba(255,255,255,.55)" />
          <rect x="136" y="108" width="48" height="10" rx="5" fill="rgba(255,255,255,.45)" />
          <rect x="206" y="90" width="56" height="97" rx="12" fill="#B7B7A4" />
          <rect x="214" y="106" width="40" height="10" rx="5" fill="rgba(255,255,255,.55)" />
          <circle cx="262" cy="70" r="18" fill="rgba(107,112,92,.30)" />
          <circle cx="286" cy="60" r="12" fill="rgba(107,112,92,.22)" />
        </svg>

        <div class="art-meta">
          <div class="kicker"> ULLS • Admin Portal</div>
          <p class="art-title">Library Management Login</p>
          <p class="art-sub">Secure access for authorized administrators.</p>
        </div>
      </div>

      <!-- LOGIN CARD -->
      <div class="login">
        <div class="title">Login</div>
        <div class="divider"></div>

        <form method="post" class="form" autocomplete="off">
          <div>
            <label for="username">Username</label>
            <input id="username" class="field" name="username" placeholder="Enter username" required>
          </div>

          <div>
            <label for="password">Password</label>
            <input id="password" class="field" name="password" type="password" placeholder="Enter password" required>
          </div>

          <button class="btn btn-primary" type="submit">Login</button>

          <div class="row">
            <a class="link" href="{{ url_for('landing') }}">← Back to Home</a>
          </div>

          {% if error %}
          <div class="error">{{ error }}</div>
          {% endif %}
        </form>

        <div class="mini-foot">© Urdaneta City Library • ULLS</div>
      </div>
    </div>
  </div>
</body>
</html>
